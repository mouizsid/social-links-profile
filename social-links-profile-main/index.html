<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Figtree:ital,wght@0,300..900;1,300..900&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Outfit:wght@100..900&display=swap" rel="stylesheet">
  
  <title>Frontend Mentor | Social links profile</title>

 
  <style>
    .attribution { font-size: 0.6875rem; text-align: center; }
    .attribution a { color: hsl(228, 45%, 44%); }
    body{
      background-color: hsl(0, 0%, 8%);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      flex-direction: column;

    }
    .card{
      border-radius: 16px;
      padding: 16px;
      background-color: hsl(0, 0%, 20%);
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 320px;
      
    }
    .pf-pic{
      width: 80px;
      border-radius: 50%;
      margin-bottom: 12px;
    }
    .username{
      font-family: "Inter";
      font-weight: 700;
      color: hsl(0, 0%, 100%);
      font-size: 14px;
      margin-bottom: 8px;
    }
    .adress{
      font-family: "Inter";
       font-weight: 400;
       color: hsl(75, 94%, 57%);
       font-size: 14px;
       margin-bottom: 8px;

    }
    .description{
        font-family: "Inter";
       font-weight: 400;
       color: hsl(0, 0%, 100%);
       font-size: 12px;
       margin-bottom: 12px;
    }
    .btn {
       width: 100%;
       padding: 12px;
       border-radius: 8px;
       border: none;
      background-color: hsl(0, 0%, 12%);
      color: hsl(0, 0%, 100%);
      font-weight: 700;
      cursor: pointer;
       font-family: "Inter";
       font-weight: 400;
       margin-bottom: 12px;
}
   
  </style>
</head>
<body>
   <div class="card">
    <img src="./assets/images/avatar-jessica.jpeg" alt="" class="pf-pic">
    <div class="username">Jessica Randall</div>
    <div class="adress">London, United Kingdom</div>
    <div class="description">"Front-end developer and avid reader."</div>
  <button class="btn">GitHub</button>
  <button class="btn">Frontend Mentor</button>
  <button class="btn">LinkedIn</button>
  <button class="btn">Twitter</button>
  <button class="btn">Instagram</button>

        
   </div>
 
  
  <footer class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>. 
    Coded by <a href="#">Mouiz</a>.
  </footer>
</body>
</html>
